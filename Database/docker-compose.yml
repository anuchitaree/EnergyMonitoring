version: "3.8"

services:
  postgres_db:
    image: postgres:16
    container_name: postgres16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - C:\Database\postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: always

  pgadmin4:
    image: dpage/pgadmin4
    container_name: pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=root
    ports:
      - 8085:80
    # volumes:
    # - D:\Database\postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: always

networks:
  backend:
    external: true 
    name: backend-net