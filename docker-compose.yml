services:

  energymonitoring:
    build:
      context: .
      dockerfile: Dockerfile   
    container_name: energy-api

    ports:
      - "8080:8080"

    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"

    group_add:
      - dialout
      
    networks:
      - backend

networks:
  backend:
    external: true
    name: backend-net